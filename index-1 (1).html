<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BlaineView Cabins</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  const app = initializeApp({ databaseURL: "https://family-getaway-default-rtdb.firebaseio.com" });
  const db = getDatabase(app);
  window._fbDb=db; window._fbRef=ref; window._fbOnValue=onValue; window._fbSet=set;
  window._fbReady=true; window.dispatchEvent(new Event("firebase-ready"));
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#F7F0E3;font-family:'Lato',sans-serif;color:#1A1A1A;}
input,textarea,button{font-family:'Lato',sans-serif;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const ADMIN_PW    = "TrueNorth24";
const ADMIN_EMAIL  = "mdkorver@gmail.com";
const BREVO_KEY    = "xkeysib-c1d95fdb6080e390a89ee524b0dff81933f40eac2ef5";
const SENDER_EMAIL = "mdkorver@gmail.com";
const SENDER_NAME  = "BlaineView Cabins";

const sendEmail = async (toEmail, toName, subject, message) => {
  try {
    const res = await fetch("https://api.brevo.com/v3/smtp/email", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "api-key": BREVO_KEY
      },
      body: JSON.stringify({
        sender: { name: SENDER_NAME, email: SENDER_EMAIL },
        to: [{ email: toEmail, name: toName }],
        subject: subject,
        textContent: message
      })
    });
    const data = await res.json();
    console.log("Brevo email result:", data);
  } catch(e) { console.log("Brevo email error:", e); }
};

const fbListen=(path,cb)=>{
  const check=()=>{ if(!window._fbReady){window.addEventListener("firebase-ready",check,{once:true});return;} window._fbOnValue(window._fbRef(window._fbDb,path),snap=>cb(snap.val()||[])); };
  check();
};
const fbWrite=(path,data)=>new Promise(resolve=>{
  const check=()=>{ if(!window._fbReady){window.addEventListener("firebase-ready",check,{once:true});return;} window._fbSet(window._fbRef(window._fbDb,path),data).then(resolve).catch(resolve); };
  check();
});

const HOUSES={
  dads_house:{id:"dads_house",name:"Dad's House",icon:"🏡",color:"#7C4A1E",light:"#FEF3E2",border:"#E8C99A",type:"rooms",
    rooms:[{id:"upstairs",name:"Upstairs Room",sleeps:2,details:"Private upstairs bedroom"},{id:"basement",name:"Basement Suite",sleeps:6,details:"Bedroom + pullout couch + bunk beds"}],
    getFee(r){const u=r.includes("upstairs"),b=r.includes("basement");if(u&&b)return 250;if(b)return 160;if(u)return 250;return 0;},feeNote:"Cleaning fee: $160–$250 depending on rooms"},
  cabin:{id:"cabin",name:"The Cabin",icon:"🌲",color:"#1F4025",light:"#EBF4EC",border:"#A8CCA8",type:"rooms",
    rooms:[{id:"master",name:"Master Bedroom",sleeps:2,details:"Private en suite bathroom"},{id:"middle",name:"Middle Room",sleeps:2,details:"Jack & Jill — shares bathroom with Master"},{id:"front",name:"Front Room",sleeps:2,details:"No private bathroom"},{id:"back",name:"Back Bedroom",sleeps:1,details:"Not available for booking",unavailable:true}],
    getFee(){return 150;},feeNote:"Cleaning fee: $150 per stay"},
  camper:{id:"camper",name:"Camper Trailer",icon:"🚐",color:"#1A5276",light:"#EBF5FB",border:"#A9CCE3",type:"unit",
    rooms:[{id:"camper_unit",name:"Camper Trailer",sleeps:4,details:"Full camper trailer — sleeps up to 4"}],
    getFee(){return 75;},feeNote:"Cleaning fee: $75 per stay"},
  byot:{id:"byot",name:"Bring Your Own Tent",icon:"⛺",color:"#6E4B1B",light:"#FDF2E9",border:"#D5A87A",type:"unit",
    rooms:[{id:"tent_spot",name:"Tent Camping Spot",sleeps:0,details:"Open camping area — bring your own tent"}],
    getFee(){return 10;},feeNote:"Site fee: $10"},
  byotr:{id:"byotr",name:"Bring Your Own Trailer",icon:"🚛",color:"#4A235A",light:"#F4ECF7",border:"#C39BD3",type:"unit",
    rooms:[{id:"trailer_spot",name:"Trailer / RV Spot",sleeps:0,details:"Pull-through spot — bring your own trailer or RV"}],
    getFee(){return 10;},feeNote:"Site fee: $10"}
};

const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const WDAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const uid=()=>"BVC-"+Math.random().toString(36).slice(2,8).toUpperCase();
const toYMD=d=>d.toISOString().slice(0,10);
const todayStr=()=>toYMD(new Date());
const fmt=s=>s?new Date(s+"T12:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"";
const overlap=(s1,e1,s2,e2)=>s1<e2&&e1>s2;
const nights=(ci,co)=>Math.round((new Date(co+"T12:00")-new Date(ci+"T12:00"))/864e5);
const getRoomNames=(b)=>{ const h=HOUSES[b.house]; return b.rooms.map(rid=>h?.rooms.find(r=>r.id===rid)?.name).filter(Boolean).join(", "); };

const S={
  nav:{background:"#1F4025",padding:"0 16px",display:"flex",alignItems:"center",boxShadow:"0 2px 10px rgba(0,0,0,.25)",position:"sticky",top:0,zIndex:100},
  brand:{fontFamily:"'Playfair Display',serif",color:"#D4A843",fontSize:17,fontWeight:700,marginRight:12,whiteSpace:"nowrap",padding:"14px 0"},
  tabs:{display:"flex",overflowX:"auto"},
  tab:a=>({padding:"14px 12px",color:a?"#D4A843":"rgba(255,255,255,.6)",background:"none",border:"none",borderBottom:a?"2px solid #D4A843":"2px solid transparent",cursor:"pointer",fontSize:13,fontWeight:a?700:400,whiteSpace:"nowrap"}),
  main:{maxWidth:920,margin:"0 auto",padding:"28px 16px 80px"},
  h1:{fontFamily:"'Playfair Display',serif",fontSize:"clamp(24px,5vw,40px)",fontWeight:700,color:"#1F4025",marginBottom:8},
  grid:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:16,marginBottom:28},
  card:(bc="#E8DCC8")=>({background:"#FFFDF6",borderRadius:14,border:`1px solid ${bc}`,overflow:"hidden",boxShadow:"0 2px 12px rgba(0,0,0,.07)"}),
  chdr:bg=>({background:bg,padding:"14px 18px"}),
  ctitle:(c="#1A1A1A")=>({fontFamily:"'Playfair Display',serif",fontSize:19,fontWeight:700,color:c,marginBottom:3}),
  roomRow:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"10px 18px",borderBottom:"1px solid #F0E8D6"},
  chip:(c,bg)=>({display:"inline-block",background:bg||c+"22",color:c,borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:700}),
  status:s=>({display:"inline-block",borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:700,
    background:s==="approved"?"#E6F4EA":s==="denied"?"#FDECEA":s==="cancelled"?"#F0E0FF":"#FFF8E1",
    color:s==="approved"?"#1F4025":s==="denied"?"#C0392B":s==="cancelled"?"#5B21B6":"#9A6300"}),
  btn:(v="primary")=>({background:v==="primary"?"#1F4025":v==="amber"?"#C8842A":v==="danger"?"#B03030":v==="purple"?"#8B5CF6":v==="ghost"?"transparent":"#1F4025",color:v==="ghost"?"#1F4025":"#fff",border:v==="ghost"?"2px solid #1F4025":"none",borderRadius:8,padding:"10px 22px",cursor:"pointer",fontSize:14,fontWeight:700}),
  btnsm:(v="primary")=>({background:v==="primary"?"#1F4025":v==="amber"?"#C8842A":v==="danger"?"#B03030":v==="purple"?"#8B5CF6":v==="ghost"?"transparent":"#1F4025",color:v==="ghost"?"#1F4025":"#fff",border:v==="ghost"?"2px solid #1F4025":"none",borderRadius:8,padding:"7px 14px",cursor:"pointer",fontSize:13,fontWeight:700}),
  inp:{width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid #CCBFA8",fontSize:15,background:"#FFFDF6",color:"#1A1A1A",boxSizing:"border-box"},
  lbl:{display:"block",fontSize:12,fontWeight:700,color:"#776B5A",marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"},
  fg:{marginBottom:18},
  sectitle:{fontFamily:"'Playfair Display',serif",fontSize:22,color:"#1F4025",marginBottom:16},
  divider:{border:"none",borderTop:"1px solid #E8DCC8",margin:"24px 0"},
  alert:t=>({background:t==="warn"?"#FFFBE6":t==="error"?"#FDECEA":t==="purple"?"#F4ECF7":"#EBF4EC",border:`1px solid ${t==="warn"?"#F0D060":t==="error"?"#EDAAA8":t==="purple"?"#C39BD3":"#A8CCA8"}`,borderRadius:8,padding:"12px 16px",marginBottom:16,fontSize:14}),
  calGrid:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:16},
  calDay:(a,sel,today)=>({minHeight:65,padding:"4px 5px",borderRadius:6,background:a?"#FFFDF6":"#F0E8D8",border:today?"2px solid #D4A843":sel?"2px solid #1F4025":"1px solid #E8DCC8",opacity:a?1:.45,cursor:"pointer"}),
  calNum:today=>({fontSize:12,fontWeight:today?700:400,color:today?"#D4A843":"#776B5A",marginBottom:3}),
};

function App(){
  const [view,setView]=useState("home");
  const [bookings,setBookings]=useState([]);
  const [mandyBlocks,setMandyBlocks]=useState([]);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{ initEmail(); fbListen("bookings",data=>{setBookings(Array.isArray(data)?data:Object.values(data||{}));setLoading(false);}); fbListen("mandy_blocks",data=>{setMandyBlocks(Array.isArray(data)?data:Object.values(data||{}));}); },[]);
  const save=useCallback(async list=>{setBookings(list);await fbWrite("bookings",list);},[]);
  const saveBlocks=useCallback(async list=>{setMandyBlocks(list);await fbWrite("mandy_blocks",list);},[]);
  if(loading) return(<div style={{minHeight:"100vh",background:"#F7F0E3",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:28,color:"#1F4025"}}>🏔 BlaineView Cabins</div><div style={{color:"#776B5A"}}>Loading…</div></div>);
  const p={bookings,save,setView,mandyBlocks,saveBlocks};
  return(
    <div style={{minHeight:"100vh",background:"#F7F0E3"}}>
      <nav style={S.nav}>
        <div style={S.brand}>🏔 BlaineView Cabins</div>
        <div style={S.tabs}>
          {[["home","Home"],["book","Book"],["check","My Booking"],["calendar","Calendar"],["admin","Admin"]].map(([id,label])=>(
            <button key={id} style={S.tab(view===id)} onClick={()=>setView(id)}>{label}</button>
          ))}
        </div>
      </nav>
      <div style={S.main}>
        {view==="home"&&<HomeView {...p}/>}
        {view==="book"&&<BookView {...p}/>}
        {view==="check"&&<CheckView {...p}/>}
        {view==="calendar"&&<CalView {...p}/>}
        {view==="admin"&&<AdminView {...p}/>}
      </div>
    </div>
  );
}

// ── HOME ──────────────────────────────────────────────────────────────────
function HomeView({bookings,setView}){
  const approved=bookings.filter(b=>b.status==="approved");
  const pending=bookings.filter(b=>b.status==="pending");
  const cancelReqs=bookings.filter(b=>b.cancelRequested&&b.status==="approved");
  const upcoming=approved.filter(b=>b.checkOut>=todayStr()).sort((a,b)=>a.checkIn.localeCompare(b.checkIn)).slice(0,8);
  return(
    <div>
      <div style={{textAlign:"center",padding:"32px 0 24px"}}>
        <h1 style={S.h1}>BlaineView Cabins</h1>
        <p style={{color:"#776B5A",fontSize:15}}>Kalispell, Montana — Family vacation property</p>
        <div style={{...S.alert("info"),maxWidth:520,margin:"16px auto 0",fontSize:13}}>
          🏠 <strong>Staying here is FREE for family.</strong> Fees listed are <strong>cleaning fees only</strong>.<br/>
          <span style={{marginTop:6,display:"block"}}>📅 Please check the <strong>Calendar View</strong> for available dates for each room.</span>
        </div>
        <div style={{marginTop:20,display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
          <button style={S.btn("primary")} onClick={()=>setView("book")}>📅 Request a Stay</button>
          <button style={S.btn("ghost")} onClick={()=>setView("calendar")}>📆 View Calendar</button>
        </div>
      </div>
      {pending.length>0&&<div style={S.alert("warn")}>⏳ <strong>{pending.length} pending booking request{pending.length>1?"s":""}</strong> awaiting your approval.</div>}
      {cancelReqs.length>0&&<div style={S.alert("purple")}>🚫 <strong>{cancelReqs.length} cancellation request{cancelReqs.length>1?"s":""}</strong> awaiting your review.</div>}
      <div style={S.grid}>{Object.values(HOUSES).map(h=><HouseCard key={h.id} house={h}/>)}</div>
      {upcoming.length>0&&(
        <div>
          <h2 style={S.sectitle}>Upcoming Stays</h2>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {upcoming.map(b=><BRow key={b.id} b={b}/>)}
          </div>
        </div>
      )}
    </div>
  );
}

function HouseCard({house}){
  return(
    <div style={S.card(house.border)}>
      <div style={S.chdr(house.light)}>
        <h2 style={S.ctitle(house.color)}>{house.icon} {house.name}</h2>
        <div style={{fontSize:12,color:house.color,opacity:.8,marginTop:2}}>{house.feeNote}</div>
      </div>
      {house.rooms.map(r=>(
        <div key={r.id} style={S.roomRow}>
          <div><div style={{fontWeight:700,fontSize:13,color:r.unavailable?"#AAA":"inherit",marginBottom:2}}>{r.name}</div><div style={{fontSize:11,color:"#888"}}>{r.details}{r.sleeps>0?` · Sleeps ${r.sleeps}`:""}</div></div>
          {r.unavailable?<span style={S.chip("#999")}>Not Available</span>:<span style={S.chip("#1F4025","#E6F4EA")}>See Calendar</span>}
        </div>
      ))}
    </div>
  );
}

// ── BOOK ──────────────────────────────────────────────────────────────────
function BookView({bookings,save,setView}){
  const [step,setStep]=useState(1);
  const [houseId,setHouseId]=useState(null);
  const [rooms,setRooms]=useState([]);
  const [checkIn,setCI]=useState("");
  const [checkOut,setCO]=useState("");
  const [name,setName]=useState("");
  const [email,setEmail]=useState("");
  const [guests,setGuests]=useState("");
  const [notes,setNotes]=useState("");
  const [doneId,setDoneId]=useState(null);
  const [saving,setSaving]=useState(false);
  const house=houseId?HOUSES[houseId]:null;
  const fee=house&&rooms.length?house.getFee(rooms):null;
  const toggle=id=>setRooms(p=>p.includes(id)?p.filter(r=>r!==id):[...p,id]);
  const submit=async()=>{
    setSaving(true);
    const id=uid();
    const h=HOUSES[houseId];
    const rnames=rooms.map(rid=>h.rooms.find(r=>r.id===rid)?.name).filter(Boolean).join(", ");
    const booking={id,name,email,guests:parseInt(guests)||1,notes,house:houseId,rooms,checkIn,checkOut,fee,status:"pending",submittedAt:new Date().toISOString()};
    await save([...bookings,booking]);
    await sendEmail(email,name.split(" ")[0],"BlaineView Cabins — Booking Request Received",`Hi ${name.split(" ")[0]}!\n\nWe received your booking request. Mandy will review it and send you a confirmation shortly.\n\nBooking ID: ${id}\nProperty: ${h.icon} ${h.name}\nRooms: ${rnames}\nDates: ${fmt(checkIn)} – ${fmt(checkOut)}\nCleaning fee: $${fee}\n\nRemember — staying here is FREE for family. This is just the cleaning fee.\n\nTalk soon!\nBlaineView Cabins`);
    await sendEmail(ADMIN_EMAIL,"Mandy",`New Booking Request from ${name}`,`Hi Mandy!\n\nNew booking request:\n\nGuest: ${name} (${email})\nID: ${id}\nProperty: ${h.icon} ${h.name}\nRooms: ${rnames}\nDates: ${fmt(checkIn)} – ${fmt(checkOut)}\nGuests: ${guests||1}\nCleaning fee: $${fee}\nNotes: ${notes||"None"}\n\nLog in to approve or deny.`);
    setDoneId(id);setStep(5);setSaving(false);
  };
  if(step===5) return(
    <div style={{textAlign:"center",padding:"48px 20px"}}>
      <div style={{fontSize:56,marginBottom:16}}>✅</div>
      <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,color:"#1F4025",marginBottom:8}}>Request Submitted!</h2>
      <p style={{color:"#776B5A",marginBottom:20}}>Save your booking ID to check your status anytime.</p>
      <div style={{background:"#1F4025",color:"#D4A843",borderRadius:12,padding:"14px 32px",display:"inline-block",fontFamily:"monospace",fontSize:22,letterSpacing:4,marginBottom:20}}>{doneId}</div>
      <p style={{color:"#776B5A",fontSize:13,marginBottom:8}}>A confirmation email has been sent to <strong>{email}</strong>.</p>
      <p style={{color:"#776B5A",fontSize:13,marginBottom:24}}>Mandy will review and send you an approval email shortly.</p>
      <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
        <button style={S.btn("primary")} onClick={()=>setView("check")}>Check Status</button>
        <button style={S.btn("ghost")} onClick={()=>setView("home")}>Back to Home</button>
      </div>
    </div>
  );
  return(
    <div>
      <h2 style={S.sectitle}>Request a Stay</h2>
      <div style={{...S.alert("info"),marginBottom:20}}>🏠 <strong>Staying here is FREE for family.</strong> Fees listed are <strong>cleaning fees only</strong>.</div>
      <StepBar step={step}/>
      {step===1&&(
        <div>
          <p style={{color:"#776B5A",marginBottom:20}}>What would you like to book?</p>
          <div style={S.grid}>
            {Object.values(HOUSES).map(h=>(
              <div key={h.id} onClick={()=>{setHouseId(h.id);setRooms([]);}} style={{...S.card(houseId===h.id?h.color:h.border),cursor:"pointer",outline:houseId===h.id?`3px solid ${h.color}`:"none"}}>
                <div style={S.chdr(houseId===h.id?h.color:h.light)}>
                  <h3 style={S.ctitle(houseId===h.id?"#fff":h.color)}>{h.icon} {h.name}</h3>
                  <div style={{fontSize:12,color:houseId===h.id?"rgba(255,255,255,.8)":h.color,marginTop:2}}>{h.feeNote}</div>
                </div>
                {h.rooms.filter(r=>!r.unavailable).map(r=>(
                  <div key={r.id} style={S.roomRow}><div><div style={{fontWeight:700,fontSize:13,marginBottom:2}}>{r.name}</div><div style={{fontSize:11,color:"#888"}}>{r.details}{r.sleeps>0?` · Sleeps ${r.sleeps}`:""}</div></div></div>
                ))}
              </div>
            ))}
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
            <button style={S.btn(houseId?"primary":"ghost")} disabled={!houseId} onClick={()=>{if(house&&house.type==="unit"){setRooms(house.rooms.map(r=>r.id));setStep(3);}else setStep(2);}}>Next →</button>
          </div>
        </div>
      )}
      {step===2&&house&&house.type==="rooms"&&(
        <div>
          <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:house.color,marginBottom:16}}>Select Rooms — {house.name}</h3>
          {house.rooms.filter(r=>!r.unavailable).map(r=>{
            const sel=rooms.includes(r.id);
            const conflict=checkIn&&checkOut&&bookings.filter(b=>b.status==="approved"&&b.house===houseId&&overlap(checkIn,checkOut,b.checkIn,b.checkOut)).some(b=>b.rooms.includes(r.id));
            return(
              <div key={r.id} onClick={()=>!conflict&&toggle(r.id)} style={{display:"flex",gap:14,padding:"12px 16px",borderRadius:10,marginBottom:8,background:sel?"#EBF4EC":conflict?"#FEF3E2":"#FFFDF6",border:`1px solid ${sel?house.color:conflict?"#F0D060":"#E8DCC8"}`,cursor:conflict?"not-allowed":"pointer",opacity:conflict?.7:1}}>
                <div style={{width:20,height:20,borderRadius:5,border:`2px solid ${sel?house.color:"#CCBFA8"}`,background:sel?house.color:"transparent",flexShrink:0,marginTop:2,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13}}>{sel?"✓":""}</div>
                <div><div style={{fontWeight:700,fontSize:14}}>{r.name} <span style={{fontWeight:400,color:"#999",fontSize:13}}>· Sleeps {r.sleeps}</span></div><div style={{fontSize:12,color:"#888"}}>{r.details}</div>{conflict&&<div style={{fontSize:11,color:"#C8842A",marginTop:3}}>⚠ Already booked for these dates</div>}</div>
              </div>
            );
          })}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginTop:16,marginBottom:8}}>
            <div style={S.fg}><label style={S.lbl}>Check-In Date</label><input type="date" style={S.inp} value={checkIn} min={todayStr()} onChange={e=>setCI(e.target.value)}/></div>
            <div style={S.fg}><label style={S.lbl}>Check-Out Date</label><input type="date" style={S.inp} value={checkOut} min={checkIn||todayStr()} onChange={e=>setCO(e.target.value)}/></div>
          </div>
          {rooms.length>0&&checkIn&&checkOut&&checkOut>checkIn&&<div style={S.alert("info")}>🧹 <strong>Cleaning fee: ${fee}</strong> (staying here is FREE — cleaning fee only) · {nights(checkIn,checkOut)} night{nights(checkIn,checkOut)!==1?"s":""}</div>}
          <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
            <button style={S.btn("ghost")} onClick={()=>setStep(1)}>← Back</button>
            <button style={S.btn("primary")} disabled={rooms.length===0||!checkIn||!checkOut||checkOut<=checkIn} onClick={()=>setStep(3)}>Next: Your Info →</button>
          </div>
        </div>
      )}
      {step===3&&(
        <div>
          <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"#1F4025",marginBottom:16}}>{house&&house.type==="unit"?"Dates & Your Information":"Your Information"}</h3>
          {house&&house.type==="unit"&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:4}}>
              <div style={S.fg}><label style={S.lbl}>Arrival Date</label><input type="date" style={S.inp} value={checkIn} min={todayStr()} onChange={e=>setCI(e.target.value)}/></div>

          <div style={S.fg}><label style={S.lbl}>Number of Guests</label><input type="number" style={S.inp} placeholder="1" min="1" max="30" value={guests} onChange={e=>setGuests(e.target.value)}/></div>
          <div style={S.fg}><label style={S.lbl}>Notes (optional)</label><textarea style={{...S.inp,height:80,resize:"vertical"}} placeholder="Any questions for Mandy…" value={notes} onChange={e=>setNotes(e.target.value)}/></div>

            {notes&&<div style={{padding:"0 20px 12px",fontSize:13,color:"#776B5A",fontStyle:"italic"}}>{notes}</div>}

      )}

  );
}

// ── CHECK / CANCEL ─────────────────────────────────────────────────────────
function CheckView({bookings,save}){
  const [q,setQ]=useState("");
  const [result,setResult]=useState(null);
  const [searched,setSearched]=useState(false);
  const [cancelReason,setCancelReason]=useState("");
  const [showCancel,setShowCancel]=useState(false);
  const [cancelling,setCancelling]=useState(false);
  const [done,setDone]=useState(false);

  const search=()=>{
    const found=bookings.find(b=>b.id.toLowerCase()===q.trim().toLowerCase()||b.name.toLowerCase().includes(q.trim().toLowerCase())||b.email?.toLowerCase().includes(q.trim().toLowerCase()));
    setResult(found||null);setSearched(true);setShowCancel(false);setDone(false);
  };

  const requestCancel=async()=>{
    setCancelling(true);
    const updated=bookings.map(b=>b.id===result.id?{...b,cancelRequested:true,cancelReason}:b);
    await save(updated);
    await sendEmail(ADMIN_EMAIL,"Mandy",`Cancellation Request from ${result.name}`,`Hi Mandy,\n\n${result.name} has requested to cancel their booking.\n\nBooking ID: ${result.id}\nProperty: ${HOUSES[result.house]?.name}\nDates: ${fmt(result.checkIn)} – ${fmt(result.checkOut)}\nReason: ${cancelReason||"None given"}\n\nLog in to approve or deny the cancellation.`);
    setCancelling(false);setShowCancel(false);setDone(true);
  };

  return(
    <div>
      <h2 style={S.sectitle}>Check My Booking</h2>
      <p style={{color:"#776B5A",marginBottom:20}}>Enter your booking ID, name, or email address.</p>
      <div style={{display:"flex",gap:10,marginBottom:24}}>
        <input style={{...S.inp,flex:1}} placeholder="BVC-XXXXXX, your name, or email" value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&search()}/>
        <button style={S.btn("primary")} onClick={search}>Look Up</button>
      </div>
      {searched&&!result&&<div style={S.alert("warn")}>No booking found. Try your booking ID, name, or email.</div>}
      {done&&<div style={S.alert("info")}>✅ Your cancellation request has been sent to Mandy. She will review and get back to you.</div>}
      {result&&!done&&(
        <div style={S.card()}>
          <div style={{padding:"16px 20px",borderBottom:"1px solid #F0E8D6",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
            <div><div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,marginBottom:4}}>{result.name}</div><div style={{fontFamily:"monospace",fontSize:13,color:"#776B5A"}}>{result.id}</div></div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              <span style={S.status(result.status)}>{result.cancelRequested?"CANCEL REQUESTED":result.status.toUpperCase()}</span>
            </div>
          </div>
          <div style={{padding:"12px 20px",borderBottom:"1px solid #F0E8D6"}}><div style={{fontWeight:700,marginBottom:4}}>{HOUSES[result.house]?.icon} {HOUSES[result.house]?.name}</div><div style={{fontSize:14,color:"#776B5A"}}>{fmt(result.checkIn)} → {fmt(result.checkOut)} · {nights(result.checkIn,result.checkOut)} nights</div></div>
          <div style={{padding:"12px 20px",borderBottom:"1px solid #F0E8D6"}}>
            {result.rooms.map(rid=>{const r=HOUSES[result.house]?.rooms.find(x=>x.id===rid);return r?<div key={rid} style={{fontSize:14,marginBottom:3}}>• {r.name}</div>:null;})}
          </div>
          <div style={{padding:"12px 20px",display:"flex",justifyContent:"space-between",fontSize:14,borderBottom:"1px solid #F0E8D6"}}><span style={{color:"#776B5A"}}>🧹 Cleaning/Site Fee</span><span style={{fontWeight:700}}>${result.fee}</span></div>
          {result.adminMessage&&<div style={{padding:"12px 20px",background:"#F9F4EC",borderTop:"1px solid #F0E8D6"}}><div style={{fontSize:12,fontWeight:700,color:"#776B5A",marginBottom:4}}>MESSAGE FROM MANDY</div><div style={{fontSize:14,whiteSpace:"pre-line"}}>{result.adminMessage}</div></div>}
          {result.status==="approved"&&!result.cancelRequested&&(
            <div style={{padding:"12px 20px"}}>
              {!showCancel
                ?<button style={S.btnsm("danger")} onClick={()=>setShowCancel(true)}>🚫 Request Cancellation</button>
                :(
                  <div>
                    <div style={{...S.alert("warn"),marginBottom:12}}>⚠ Cancellation requests are subject to a <strong>cancellation fee</strong> depending on how close your dates are. Mandy will confirm the fee when she reviews your request.</div>
                    <div style={S.fg}><label style={S.lbl}>Reason for Cancellation (optional)</label><textarea style={{...S.inp,height:70,resize:"vertical"}} placeholder="Let Mandy know why you need to cancel…" value={cancelReason} onChange={e=>setCancelReason(e.target.value)}/></div>
                    <div style={{display:"flex",gap:8}}>
                      <button style={S.btnsm("ghost")} onClick={()=>setShowCancel(false)}>Never mind</button>
                      <button style={S.btnsm("danger")} onClick={requestCancel} disabled={cancelling}>{cancelling?"Sending…":"Submit Cancellation Request"}</button>
                    </div>
                  </div>
                )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── CALENDAR ──────────────────────────────────────────────────────────────
function CalView({bookings,mandyBlocks}){
  const now=new Date();
  const [year,setYear]=useState(now.getFullYear());
  const [month,setMonth]=useState(now.getMonth());
  const [sel,setSel]=useState(null);
  const approved=bookings.filter(b=>b.status==="approved");
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const getDayBookings=day=>{const d=toYMD(new Date(year,month,day));return approved.filter(b=>d>=b.checkIn&&d<b.checkOut);};
  const getDayMandy=day=>{const d=toYMD(new Date(year,month,day));return(mandyBlocks||[]).filter(mb=>d>=mb.start&&d<mb.end);};
  const prevM=()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);};
  const nextM=()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);};
  const selBookings=sel?getDayBookings(sel):[];
  const selMandy=sel?getDayMandy(sel):[];
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <h2 style={{...S.sectitle,margin:0}}>Availability Calendar</h2>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button style={S.btnsm("ghost")} onClick={prevM}>‹</button>
          <span style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:600,minWidth:148,textAlign:"center"}}>{MONTHS[month]} {year}</span>
          <button style={S.btnsm("ghost")} onClick={nextM}>›</button>
        </div>
      </div>
      <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
        {Object.values(HOUSES).map(h=>(
          <div key={h.id} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:11,height:11,borderRadius:2,background:h.color}}/><span style={{fontSize:11,color:"#776B5A"}}>{h.icon} {h.name}</span></div>
        ))}
        <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:11,height:11,borderRadius:2,background:"#8B5CF6"}}/><span style={{fontSize:11,color:"#776B5A"}}>👤 Mandy</span></div>
      </div>
      <div style={S.calGrid}>{WDAYS.map(d=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,color:"#776B5A",padding:"3px 0",textTransform:"uppercase"}}>{d}</div>)}</div>
      <div style={S.calGrid}>
        {Array.from({length:firstDay}).map((_,i)=><div key={"e"+i} style={{...S.calDay(false,false,false),opacity:0}}/>)}
        {Array.from({length:daysInMonth}).map((_,i)=>{
          const day=i+1,d=toYMD(new Date(year,month,day)),isToday=d===todayStr(),isSel=sel===day;
          const dbs=getDayBookings(day),dms=getDayMandy(day);
          return(
            <div key={day} style={S.calDay(true,isSel,isToday)} onClick={()=>setSel(isSel?null:day)}>
              <div style={S.calNum(isToday)}>{day}</div>
              {dms.map((_,j)=><div key={"m"+j} style={{background:"#8B5CF6",color:"#fff",borderRadius:3,fontSize:9,padding:"1px 4px",marginBottom:2,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>Mandy</div>)}
              {dbs.slice(0,2).map((b,j)=>{const rn=getRoomNames(b);return(<div key={j} style={{background:HOUSES[b.house]?.color||"#999",color:"#fff",borderRadius:3,fontSize:9,padding:"1px 4px",marginBottom:2,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{b.name.split(" ")[0]}: {rn}</div>);})}
              {dbs.length>2&&<div style={{fontSize:9,color:"#999"}}>+{dbs.length-2}</div>}
            </div>
          );
        })}
      </div>
      {sel&&(selBookings.length>0||selMandy.length>0)&&(
        <div style={{...S.card(),marginTop:16}}>
          <div style={{padding:"12px 20px",borderBottom:"1px solid #F0E8D6",fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700}}>{MONTHS[month]} {sel}, {year}</div>
          {selMandy.map((mb,i)=>(
            <div key={"mb"+i} style={{padding:"12px 20px",borderBottom:"1px solid #F0E8D6",display:"flex",gap:12,alignItems:"flex-start"}}>
              <div style={{width:4,borderRadius:2,alignSelf:"stretch",background:"#8B5CF6",flexShrink:0}}/>
              <div><div style={{fontWeight:700,fontSize:14,marginBottom:2}}>Mandy at Property</div><div style={{fontSize:12,color:"#776B5A"}}>The Cabin · Back Bedroom</div><div style={{fontSize:12,color:"#776B5A"}}>{fmt(mb.start)} → {fmt(mb.end)}</div>{mb.note&&<div style={{fontSize:12,color:"#888",fontStyle:"italic",marginTop:2}}>{mb.note}</div>}</div>
            </div>
          ))}
          {selBookings.map(b=>{const h=HOUSES[b.house];const rnames=getRoomNames(b);return(
            <div key={b.id} style={{padding:"12px 20px",borderBottom:"1px solid #F0E8D6",display:"flex",gap:12,alignItems:"flex-start"}}>
              <div style={{width:4,borderRadius:2,alignSelf:"stretch",background:h?.color||"#999",flexShrink:0}}/>
              <div>
                <div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{b.name}</div>
                <div style={{fontSize:12,color:"#776B5A"}}>{h?.icon} {h?.name}</div>
                <div style={{fontSize:12,color:"#776B5A"}}>Rooms: {rnames}</div>
                <div style={{fontSize:12,color:"#776B5A"}}>{fmt(b.checkIn)} → {fmt(b.checkOut)}</div>
              </div>
            </div>
          );})}
        </div>
      )}
      {sel&&selBookings.length===0&&selMandy.length===0&&<div style={{...S.alert("info"),marginTop:16}}>No bookings on {MONTHS[month]} {sel}.</div>}
    </div>
  );
}

// ── ADMIN ─────────────────────────────────────────────────────────────────
function AdminView({bookings,save,mandyBlocks,saveBlocks}){
  const [authed,setAuthed]=useState(false);
  const [pw,setPw]=useState("");
  const [pwErr,setPwErr]=useState("");
  const [filter,setFilter]=useState("pending");
  const [modal,setModal]=useState(null);
  const [adminMsg,setAdminMsg]=useState("");
  const [copied,setCopied]=useState(false);
  const [bStart,setBStart]=useState("");
  const [bEnd,setBEnd]=useState("");
  const [bNote,setBNote]=useState("");
  const [bSaved,setBSaved]=useState(false);
  const [sending,setSending]=useState(false);

  const login=()=>{if(pw===ADMIN_PW){setAuthed(true);setPwErr("");}else setPwErr("Incorrect password.");};

  const cancelRequests=bookings.filter(b=>b.cancelRequested&&b.status==="approved");
  const cancelled=bookings.filter(b=>b.status==="cancelled");
  const filtered=bookings.filter(b=>{
    if(filter==="pending") return b.status==="pending";
    if(filter==="approved") return b.status==="approved"&&!b.cancelRequested;
    if(filter==="denied") return b.status==="denied";
    if(filter==="cancelled") return b.status==="cancelled";
    if(filter==="all") return true;
    return false;
  }).sort((a,b)=>b.submittedAt.localeCompare(a.submittedAt));

  const openModal=(id,action)=>{
    const b=bookings.find(x=>x.id===id);if(!b)return;
    const h=HOUSES[b.house],rnames=getRoomNames(b);
    if(action==="approve") setAdminMsg(`Hi ${b.name.split(" ")[0]}!\n\n✅ Your booking at BlaineView Cabins has been APPROVED!\n\n${h?.icon} ${h?.name}\nRooms: ${rnames}\nDates: ${fmt(b.checkIn)} – ${fmt(b.checkOut)}\nCleaning fee: $${b.fee}\n\nRemember — staying here is FREE for family. This is just the cleaning fee.\n\nSee you soon! 🏔\nMandy`);
    else if(action==="deny") setAdminMsg(`Hi ${b.name.split(" ")[0]},\n\nUnfortunately your booking request could not be approved for those dates. Please try different dates or reach out to Mandy directly.\n\n— BlaineView Cabins`);
    else if(action==="approve_cancel") setAdminMsg(`Hi ${b.name.split(" ")[0]},\n\nYour cancellation request for ${fmt(b.checkIn)} – ${fmt(b.checkOut)} at ${h?.name} has been approved.\n\nPlease note that a cancellation fee may apply. Mandy will be in touch with the details.\n\n— BlaineView Cabins`);
    else if(action==="deny_cancel") setAdminMsg(`Hi ${b.name.split(" ")[0]},\n\nYour cancellation request has been denied. Your booking for ${fmt(b.checkIn)} – ${fmt(b.checkOut)} at ${h?.name} remains active.\n\nPlease reach out to Mandy if you have questions.\n\n— BlaineView Cabins`);
    setModal({id,action});
  };

  const confirmAction=async()=>{
    setSending(true);
    const b=bookings.find(x=>x.id===modal.id);
    let patch={};
    if(modal.action==="approve") patch={status:"approved",adminMessage:adminMsg};
    else if(modal.action==="deny") patch={status:"denied",adminMessage:adminMsg};
    else if(modal.action==="approve_cancel") patch={status:"cancelled",cancelRequested:false,adminMessage:adminMsg};
    else if(modal.action==="deny_cancel") patch={cancelRequested:false,adminMessage:adminMsg};
    const updated=bookings.map(x=>x.id===modal.id?{...x,...patch}:x);
    await save(updated);
    if(b?.email) await sendEmail(b.email,b.name.split(" ")[0],
      modal.action==="approve"?"✅ BlaineView Cabins — Booking Approved!":
      modal.action==="deny"?"BlaineView Cabins — Booking Update":
      modal.action==="approve_cancel"?"BlaineView Cabins — Cancellation Approved":
      "BlaineView Cabins — Cancellation Update",
      adminMsg
    );
    setSending(false);setModal(null);setAdminMsg("");
  };

  const addBlock=async()=>{if(!bStart||!bEnd||bEnd<=bStart)return;await saveBlocks([...(mandyBlocks||[]),{id:uid(),start:bStart,end:bEnd,note:bNote}]);setBStart("");setBEnd("");setBNote("");setBSaved(true);setTimeout(()=>setBSaved(false),2500);};
  const removeBlock=async id=>await saveBlocks((mandyBlocks||[]).filter(b=>b.id!==id));

  if(!authed) return(
    <div style={{maxWidth:400,margin:"60px auto",padding:32,background:"#FFFDF6",borderRadius:14,border:"1px solid #E8DCC8",boxShadow:"0 4px 20px rgba(0,0,0,.08)"}}>
      <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:26,color:"#1F4025",textAlign:"center",marginBottom:8}}>Admin Access</h2>
      <p style={{color:"#776B5A",fontSize:14,textAlign:"center",marginBottom:24}}>BlaineView Cabins — Owner Portal</p>
      <div style={S.fg}><label style={S.lbl}>Password</label><input type="password" style={S.inp} value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} autoFocus/></div>
      {pwErr&&<div style={{color:"#B03030",fontSize:13,marginBottom:12}}>{pwErr}</div>}
      <button style={{...S.btn("primary"),width:"100%"}} onClick={login}>Enter</button>
    </div>
  );

  return(
    <div>
      <h2 style={S.sectitle}>Admin — Manage Bookings</h2>

      {/* Cancellation Requests Alert */}
      {cancelRequests.length>0&&(
        <div style={{...S.alert("purple"),marginBottom:20}}>
          🚫 <strong>{cancelRequests.length} cancellation request{cancelRequests.length>1?"s":""}</strong> pending your review.
        </div>
      )}

      {/* Cancellation Requests Section */}
      {cancelRequests.length>0&&(
        <div style={{marginBottom:24}}>
          <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"#5B21B6",marginBottom:12}}>🚫 Cancellation Requests</h3>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {cancelRequests.map(b=>{const h=HOUSES[b.house];return(
              <div key={b.id} style={{...S.card("#C39BD3")}}>
                <div style={{padding:"12px 18px",borderBottom:"1px solid #D8BEF0"}}>
                  <div style={{fontWeight:700,fontSize:15,marginBottom:2}}>{b.name} <span style={{fontSize:12,fontWeight:400,color:"#776B5A"}}>({b.email})</span></div>
                  <div style={{fontSize:13,color:"#5B21B6"}}>{h?.icon} {h?.name} · {getRoomNames(b)}</div>
                  <div style={{fontSize:13,color:"#776B5A"}}>{fmt(b.checkIn)} → {fmt(b.checkOut)}</div>
                  {b.cancelReason&&<div style={{fontSize:12,color:"#888",marginTop:4,fontStyle:"italic"}}>Reason: {b.cancelReason}</div>}
                </div>
                <div style={{padding:"10px 18px",display:"flex",gap:8,justifyContent:"flex-end"}}>
                  <button style={S.btnsm("ghost")} onClick={()=>openModal(b.id,"deny_cancel")}>Keep Booking</button>
                  <button style={S.btnsm("danger")} onClick={()=>openModal(b.id,"approve_cancel")}>Approve Cancellation</button>
                </div>
              </div>
            );})}
          </div>
          <hr style={S.divider}/>
        </div>
      )}

      {/* Booking Filters */}
      <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
        {["pending","approved","denied","cancelled","all"].map(f=>(
          <button key={f} style={{...S.btnsm(filter===f?"primary":"ghost"),textTransform:"capitalize"}} onClick={()=>setFilter(f)}>
            {f} <span style={{opacity:.7}}>({bookings.filter(b=>{
              if(f==="pending") return b.status==="pending";
              if(f==="approved") return b.status==="approved"&&!b.cancelRequested;
              if(f==="denied") return b.status==="denied";
              if(f==="cancelled") return b.status==="cancelled";
              return true;
            }).length})</span>
          </button>
        ))}
      </div>

      {filtered.length===0&&<div style={S.alert("info")}>No {filter==="all"?"":filter} bookings.</div>}
      <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:8}}>
        {filtered.map(b=>{const h=HOUSES[b.house];return(
          <div key={b.id} style={S.card()}>
            <div style={{padding:"14px 20px",borderBottom:"1px solid #F0E8D6",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
              <div><div style={{fontWeight:700,fontSize:16,marginBottom:2}}>{b.name}</div><div style={{fontSize:12,color:"#AAA",fontFamily:"monospace"}}>{b.id}</div></div>
              <span style={S.status(b.status)}>{b.status.toUpperCase()}</span>
            </div>
            <div style={{padding:"12px 20px",borderBottom:"1px solid #F0E8D6"}}>
              <div style={{fontSize:14,marginBottom:4}}><strong>{h?.icon} {h?.name}</strong> · {getRoomNames(b)}</div>
              <div style={{fontSize:13,color:"#776B5A"}}>{fmt(b.checkIn)} → {fmt(b.checkOut)} · {nights(b.checkIn,b.checkOut)} nights · ${b.fee} cleaning fee</div>
              <div style={{fontSize:13,color:"#776B5A"}}>{b.email} · {b.guests} guest{b.guests!==1?"s":""}</div>
              {b.notes&&<div style={{fontSize:13,color:"#776B5A",fontStyle:"italic",marginTop:4}}>{b.notes}</div>}
            </div>
            {b.adminMessage&&<div style={{padding:"10px 20px",background:"#F9F4EC",fontSize:13,color:"#776B5A",whiteSpace:"pre-line"}}><strong>Your message:</strong> {b.adminMessage}</div>}
            {b.status==="pending"&&(
              <div style={{padding:"12px 20px",display:"flex",gap:10,justifyContent:"flex-end"}}>
                <button style={S.btnsm("danger")} onClick={()=>openModal(b.id,"deny")}>Deny</button>
                <button style={S.btnsm("primary")} onClick={()=>openModal(b.id,"approve")}>Approve ✓</button>
              </div>
            )}
          </div>
        );})}
      </div>

      <hr style={S.divider}/>
      <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#8B5CF6",marginBottom:8}}>🏠 My Dates at the Property</h3>
      <p style={{color:"#776B5A",fontSize:14,marginBottom:16}}>Block dates when you'll be in the Back Bedroom. These show on the calendar in purple.</p>
      <div style={{...S.card("#D4BBFF"),padding:"18px 20px",marginBottom:16}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:14}}>
          <div><label style={S.lbl}>Arrival Date</label><input type="date" style={S.inp} value={bStart} min={todayStr()} onChange={e=>setBStart(e.target.value)}/></div>
          <div><label style={S.lbl}>Departure Date</label><input type="date" style={S.inp} value={bEnd} min={bStart||todayStr()} onChange={e=>setBEnd(e.target.value)}/></div>
        </div>
        <div style={{marginBottom:14}}><label style={S.lbl}>Note (optional)</label><input style={S.inp} placeholder="e.g. Working remotely, holiday visit…" value={bNote} onChange={e=>setBNote(e.target.value)}/></div>
        <button style={S.btn("purple")} onClick={addBlock} disabled={!bStart||!bEnd||bEnd<=bStart}>{bSaved?"✓ Saved!":"Add My Dates"}</button>
      </div>
      {(mandyBlocks||[]).length>0&&(
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
          {(mandyBlocks||[]).sort((a,b)=>a.start.localeCompare(b.start)).map(mb=>(
            <div key={mb.id} style={{...S.card("#D4BBFF"),padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <div><div style={{fontWeight:700,fontSize:14,color:"#5B21B6"}}>Mandy at Property</div><div style={{fontSize:13,color:"#776B5A"}}>{fmt(mb.start)} → {fmt(mb.end)}</div>{mb.note&&<div style={{fontSize:12,color:"#888",fontStyle:"italic"}}>{mb.note}</div>}</div>
              <button style={S.btnsm("danger")} onClick={()=>removeBlock(mb.id)}>Remove</button>
            </div>
          ))}
        </div>
      )}

      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}}>
          <div style={{background:"#FFFDF6",borderRadius:14,padding:24,maxWidth:500,width:"100%",boxShadow:"0 8px 40px rgba(0,0,0,.2)"}}>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:20,marginBottom:12,color:modal.action==="approve"||modal.action==="deny_cancel"?"#1F4025":"#B03030"}}>
              {modal.action==="approve"?"✅ Approve & Send Email":modal.action==="deny"?"❌ Deny & Send Email":modal.action==="approve_cancel"?"🚫 Approve Cancellation":"✅ Keep Booking — Send Email"}
            </h3>
            <p style={{fontSize:13,color:"#776B5A",marginBottom:12}}>This message will be emailed automatically to the guest.</p>
            <div style={S.fg}><label style={S.lbl}>Email Message</label><textarea style={{...S.inp,height:180,resize:"vertical"}} value={adminMsg} onChange={e=>setAdminMsg(e.target.value)}/></div>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <button style={S.btnsm("ghost")} onClick={()=>{try{navigator.clipboard.writeText(adminMsg);}catch{}setCopied(true);setTimeout(()=>setCopied(false),2000);}}>{copied?"✓ Copied!":"📋 Copy"}</button>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button style={S.btnsm("ghost")} onClick={()=>{setModal(null);setAdminMsg("");}}>Cancel</button>
              <button style={S.btnsm(modal.action==="approve"||modal.action==="deny_cancel"?"primary":"danger")} onClick={confirmAction} disabled={sending}>{sending?"Sending…":"Confirm & Send Email"}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function BRow({b}){
  const h=HOUSES[b.house];
  return(
    <div style={{...S.card(),padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,flexWrap:"wrap"}}>
      <div style={{display:"flex",gap:12,alignItems:"center"}}>
        <div style={{width:4,alignSelf:"stretch",borderRadius:2,background:h?.color||"#999",minHeight:36,flexShrink:0}}/>
        <div>
          <div style={{fontWeight:700,fontSize:14}}>{b.name}</div>
          <div style={{fontSize:12,color:"#776B5A"}}>{h?.icon} {h?.name} · {getRoomNames(b)}</div>
          <div style={{fontSize:12,color:"#776B5A"}}>{fmt(b.checkIn)} → {fmt(b.checkOut)}</div>
        </div>
      </div>
      <span style={S.status(b.status)}>{b.cancelRequested?"CANCEL REQ":b.status.toUpperCase()}</span>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
